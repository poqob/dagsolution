<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#3b82f6" opacity="0.05"/>
  <circle cx="1100" cy="530" r="300" fill="#8b5cf6" opacity="0.05"/>
  
  <!-- Logo D in circle -->
  <circle cx="600" cy="200" r="80" fill="url(#logoGrad)" opacity="0.9"/>
  <text x="600" y="225" font-family="Inter, Arial, sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="middle">D</text>
  
  <!-- Brand name -->
  <text x="600" y="340" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="700" fill="white" text-anchor="middle">
    <tspan fill="url(#accent)">DAG</tspan><tspan>Solution</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="Inter, Arial, sans-serif" font-size="24" fill="#9ca3af" text-anchor="middle">
    Yazılım Çözümleri
  </text>
  
  <!-- Divider -->
  <line x1="400" y1="440" x2="800" y2="440" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  
  <!-- Contact info -->
  <text x="600" y="500" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6b7280" text-anchor="middle">
    mustafa@dagsolution.com
  </text>
  <text x="600" y="540" font-family="Inter, Arial, sans-serif" font-size="20" fill="#6b7280" text-anchor="middle">
    dagsolution.com
  </text>
</svg>
